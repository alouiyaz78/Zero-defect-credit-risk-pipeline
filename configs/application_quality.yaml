datasets:

  application_train:
    columns:
      SK_ID_CURR:
        type: integer
        nullable: false
        unique: true

      TARGET:
        type: integer
        nullable: false
        allowed_values: [0, 1]

      AMT_INCOME_TOTAL:
        type: float
        nullable: false
        min: 0

      DAYS_BIRTH:
        type: integer
        nullable: false
        max: 0

  bureau:
    columns:
      SK_ID_CURR:
        type: integer
        nullable: false

      SK_ID_BUREAU:
        type: integer
        nullable: false
        unique: true

      AMT_CREDIT_SUM:
        type: float
        nullable: true
        min: 0

  previous_application:
    columns:
      SK_ID_PREV:
        type: integer
        nullable: false

      SK_ID_CURR:
        type: integer
        nullable: false

      AMT_APPLICATION:
        type: float
        nullable: true
        min: 0

      AMT_CREDIT:
        type: float
        nullable: true
        min: 0

  installments_payments:
    columns:
      SK_ID_PREV:
        type: integer
        nullable: false

      SK_ID_CURR:
        type: integer
        nullable: false

      AMT_PAYMENT:
        type: float
        nullable: true
        min: 0

  credit_card_balance:
    columns:
      SK_ID_PREV:
        type: integer
        nullable: false

      SK_ID_CURR:
        type: integer
        nullable: false

      AMT_BALANCE:
        type: float
        nullable: true

  POS_CASH_balance:
    columns:
      SK_ID_PREV:
        type: integer
        nullable: false

      SK_ID_CURR:
        type: integer
        nullable: false

      CNT_INSTALMENT:
        type: float
        nullable: true
        min: 0

  bureau_balance:
    columns:
      SK_ID_BUREAU:
        type: integer
        nullable: false

      MONTHS_BALANCE:
        type: integer
        nullable: false

      STATUS:
        type: string
        nullable: true